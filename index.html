<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para o Luca, com amor</title>
    <style>
        :root { --primary: #6c5ce7; --primary-light: #a29bfe; --bg: #f8f9fa; --card-bg: #ffffff; --text: #2d3436; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding-bottom: 50px; }
        
        /* MENU DE NAVEGAÇÃO NO TOPO */
        .nav-container { max-width: 800px; margin: 20px auto; padding: 0 20px; }
        .tabs-nav { display: flex; justify-content: space-around; background: var(--card-bg); padding: 10px; border-radius: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); overflow-x: auto; }
        .tab-link { text-decoration: none; padding: 10px 20px; font-weight: bold; color: #636e72; border-radius: 20px; transition: 0.3s; white-space: nowrap; }
        .tab-link.active { background: var(--primary); color: white; }
        
        header { text-align: center; padding: 40px 20px; background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 30px; }
        header h1 { font-size: 2.5rem; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .timers-container { display: grid; grid-template-columns: 1fr; gap: 20px; margin-bottom: 30px; }
        @media(min-width: 600px) { .timers-container { grid-template-columns: 1fr 1fr; } }
        .timer-card { background: var(--card-bg); padding: 25px; border-radius: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 2px solid var(--primary-light); }
        .timer-card h3 { font-size: 1rem; color: var(--primary); margin-bottom: 10px; text-transform: uppercase; }
        .timer-display { font-size: 1.3rem; font-weight: bold; color: #2d3436; line-height: 1.5; }
    </style>
</head>
<body>

    <!-- BARRA DE NAVEGAÇÃO -->
    <div class="nav-container">
        <nav class="tabs-nav">
            <a href="index.html" class="tab-link active">Início</a>
            <a href="fotos.html" class="tab-link">Nossos Flashes</a>
            <a href="sorrisos.html" class="tab-link">Sorrisos do Luca</a>
            <a href="pokedex.html" class="tab-link">PokeDex</a>
            <a href="cartas.html" class="tab-link">Cartas para Você</a>
        </nav>
    </div>

    <header>
        <h1>Feliz Dia dos Namorados!</h1>
        <p>Para o dono do meu sorriso mais bonito</p>
    </header>

    <div class="container">
        <div class="timers-container">
            <div class="timer-card">
                <h3>"PrimeiroOie"</h3>
                <div id="tempo-conhecemos" class="timer-display">Calculando...</div>
            </div>
            <div class="timer-card">
                <h3>Nosso Namoro</h3>
                <div id="tempo-namoro" class="timer-display">Calculando...</div>
            </div>
        </div>
    </div>

    <script>
        // AJUSTE SUAS DATAS AQUI (Ano, Mês-1, Dia, Hora, Minuto)
        const dataPrimeiroOie = new Date(2024, 1, 02, 00, 00, 0); 
        const dataNamoro     = new Date(2025, 11, 04, 00, 0, 0);  

        function calcularDiferenca(dataInicio, elementoId) {
            const agora = new Date(); const diferenca = agora - dataInicio;
            const anos = Math.floor(diferenca / (1000 * 60 * 60 * 24 * 365));
            const meses = Math.floor((diferenca % (1000 * 60 * 60 * 24 * 365)) / (1000 * 60 * 60 * 24 * 30));
            const dias = Math.floor((diferenca % (1000 * 60 * 60 * 24 * 30)) / (1000 * 60 * 60 * 24));
            const horas = Math.floor((diferenca % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutos = Math.floor((diferenca % (1000 * 60 * 60)) / (1000 * 60));
            const segundos = Math.floor((diferenca % (1000 * 60)) / 1000);
            document.getElementById(elementoId).innerHTML = `${anos}a ${meses}m ${dias}d<br>${horas}h ${minutos}m ${segundos}s`;
        }
        function atualizar() { calcularDiferenca(dataConhecemos, "PrimeiroOie"); calcularDiferenca(dataNamoro, "tempo-namoro"); }
        setInterval(atualizar, 1000); window.onload = atualizar;
    </script>
</body>
</html>
